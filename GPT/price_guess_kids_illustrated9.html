<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>הקופה הקטנה — גרסת קופה רושמת לילדים</title>
<style>
  body{margin:0;font-family:Heebo,'Segoe UI',sans-serif;background:#fef9f4;color:#222;}
  header{background:#222;color:#fff;padding:12px;display:flex;justify-content:space-between;align-items:center}
  .logo{font-size:22px;font-weight:900}
  .tabs{display:flex;gap:8px}
  .tab-btn{padding:8px 12px;border-radius:8px;border:none;background:#444;color:#fff;cursor:pointer}
  .tab-btn.active{background:#ffd166;color:#222}
  main{max-width:1000px;margin:20px auto;padding:10px}
  .card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 5px 0 #eee;margin-bottom:16px}
  .face{display:flex;align-items:center;gap:16px}
  .emoji{width:80px;height:80px;font-size:48px;border-radius:12px;display:grid;place-items:center;background:#fff;border:2px solid #ccc}
  .name{font-size:24px;font-weight:900}
  .sub{font-size:14px;color:#666}
  .register{margin-top:12px;background:#111;color:#0ef3ac;font-family:'Courier New',monospace;padding:10px;border-radius:8px;text-align:center}
  .keypad{display:grid;grid-template-columns:repeat(3,80px);gap:8px;justify-content:center;margin-top:12px}
  .keypad button{height:70px;font-size:24px;font-weight:900;border-radius:12px;border:none;background:#ffd166;cursor:pointer;box-shadow:0 4px 0 #e9b949;}
  .keypad button:active{transform:translateY(3px);box-shadow:0 1px 0 #e9b949}
  .lcd{margin-top:8px;background:#eaffea;border:2px solid #86efac;border-radius:8px;padding:10px;font-weight:900;font-size:20px;text-align:center}
  .stats{margin-top:12px;display:flex;gap:16px;justify-content:center}
  .stat-box{background:#fafafa;border-radius:8px;padding:8px 12px;text-align:center;box-shadow:inset 0 2px 4px #eee}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{border-bottom:1px solid #eee;padding:6px 8px;text-align:right}
  th{background:#f9f9f9}
</style>
</head>
<body>
  <header>
    <div class="logo">₪ הקופה הקטנה</div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="game">קופה</button>
      <button class="tab-btn" data-tab="receipt">קבלה</button>
    </div>
  </header>

  <main>
    <section id="game" class="card">
      <div class="face">
        <div class="emoji" id="p-emoji">🧃</div>
        <div>
          <div class="name" id="p-name">שם מוצר</div>
          <div class="sub" id="p-meta">קטגוריה • קושי</div>
        </div>
      </div>
      <div class="lcd" id="lcd">₪0</div>
      <div class="keypad">
        <button data-num="1">1</button>
        <button data-num="2">2</button>
        <button data-num="3">3</button>
        <button data-num="4">4</button>
        <button data-num="5">5</button>
        <button data-num="6">6</button>
        <button data-num="7">7</button>
        <button data-num="8">8</button>
        <button data-num="9">9</button>
        <button data-num="0" style="grid-column:span 3">0</button>
      </div>
      <div class="register" id="resultBox">מוכן</div>
      <div class="stats">
        <div class="stat-box"><div>נקודות</div><div id="stat-score">0</div></div>
        <div class="stat-box"><div>ניסיונות</div><div id="stat-tries">0</div></div>
      </div>
    </section>

    <section id="receipt" class="card" style="display:none;">
      <h3>🧾 קבלה</h3>
      <table id="receiptTable"><thead><tr><th>פריט</th><th>ניחוש</th><th>מחיר</th><th>סטייה</th></tr></thead><tbody></tbody></table>
    </section>
  </main>

<script>
const PRODUCTS=[{"קטגוריה":"מזון","שם מוצר":"שוקו בשקית","אייקון":"🥤","מחיר":6},{"קטגוריה":"מזון","שם מוצר":"לחמנייה","אייקון":"🥯","מחיר":3},{"קטגוריה":"משחקים","שם מוצר":"לגו","אייקון":"🧱","מחיר":240}];
let current=null,score=0,tries=0;const receiptBody=document.querySelector('#receiptTable tbody');
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function nextProduct(){current=pick(PRODUCTS);document.getElementById('p-emoji').textContent=current["אייקון"];document.getElementById('p-name').textContent=current["שם מוצר"];document.getElementById('p-meta').textContent=current["קטגוריה"];document.getElementById('resultBox').textContent='מוכן';document.getElementById('lcd').textContent='₪0';inputVal='';}
function checkGuess(){if(!current)return;const guess=Number(inputVal||0);const ref=current["מחיר"];const diff=Math.abs(guess-ref)/ref;let pts=diff<=0.1?10:diff<=0.3?6:2;score+=pts;tries++;document.getElementById('resultBox').textContent=`מחיר: ₪${ref} ניחוש: ₪${guess} (+${pts})`;document.getElementById('stat-score').textContent=score;document.getElementById('stat-tries').textContent=tries;const tr=document.createElement('tr');tr.innerHTML=`<td>${current["אייקון"]} ${current["שם מוצר"]}</td><td>₪${guess}</td><td>₪${ref}</td><td>${(diff*100).toFixed(1)}%</td>`;receiptBody.prepend(tr);nextProduct();}
let inputVal='';
const lcd=document.getElementById('lcd');
document.querySelectorAll('.keypad button').forEach(btn=>btn.onclick=()=>{inputVal+=btn.dataset.num;lcd.textContent='₪'+inputVal;});
lcd.onclick=checkGuess;
nextProduct();

// tabs
const tabs=document.querySelectorAll('.tab-btn');
const sections={game:document.getElementById('game'),receipt:document.getElementById('receipt')};
tabs.forEach(btn=>btn.onclick=()=>{tabs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');Object.keys(sections).forEach(k=>sections[k].style.display=(btn.dataset.tab===k?'block':'none'));});
</script>
</body>
</html>
