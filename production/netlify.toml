# Netlify Build Configuration
[build]
  publish = "."
  command = "echo 'הקופה הקטנה פרו מוכנה לפריסה! 🚀'"

# Redirects and URL rewrites
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Headers for better performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables
[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# Forms (if needed for contact/feedback)
[build.processing]
  skip_processing = false

# Functions (for future server-side features)
[functions]
  directory = "netlify/functions"

# Edge functions (for advanced features)
[edge_functions]
  directory = "netlify/edge-functions"

# Dev server configuration
[dev]
  command = "npx serve . -p 3000"
  port = 3000
  publish = "."
  autoLaunch = true
