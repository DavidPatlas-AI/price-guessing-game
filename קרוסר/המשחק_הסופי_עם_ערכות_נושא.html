<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 המשחק הסופי עם ערכות נושא - הכל בכסף</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ערכות נושא */
        :root {
            /* Modern Glass Theme (Default) */
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ffd166;
            --success: #06ffa5;
            --warning: #ffb347;
            --danger: #ff6b6b;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --glass-bg: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --font-main: 'Heebo', sans-serif;
            --font-digital: 'Orbitron', monospace;
            --font-mono: 'JetBrains Mono', monospace;
            --border-radius: 20px;
            --border-radius-small: 10px;
        }

        /* Cash Register Theme */
        [data-theme="register"] {
            --primary: #1a1a1a;
            --secondary: #2f2f2f;
            --accent: #ffca28;
            --success: #00e676;
            --warning: #ff8f00;
            --danger: #f44336;
            --dark: #0a1929;
            --light: #f8f9fa;
            --glass-bg: rgba(0,0,0,0.3);
            --glass-border: rgba(255,202,40,0.3);
            --gradient-1: linear-gradient(145deg, #1a1a1a, #2f2f2f);
            --gradient-2: linear-gradient(145deg, #666, #444);
            --gradient-3: linear-gradient(90deg, #ffca28, #ff8f00);
            --gradient-4: linear-gradient(135deg, #00e676, #4caf50);
            --font-main: 'Heebo', sans-serif;
            --font-digital: 'JetBrains Mono', monospace;
            --font-mono: 'Orbitron', monospace;
            --border-radius: 12px;
            --border-radius-small: 6px;
        }

        /* Neon Future Theme */
        [data-theme="neon"] {
            --primary: #0a0a0a;
            --secondary: #1a1a2e;
            --accent: #00ff88;
            --success: #00ffff;
            --warning: #ffff00;
            --danger: #ff0080;
            --dark: #000000;
            --light: #ffffff;
            --glass-bg: rgba(0,255,136,0.1);
            --glass-border: rgba(0,255,136,0.3);
            --gradient-1: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            --gradient-2: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            --gradient-3: linear-gradient(135deg, #00ff88 0%, #00ffff 100%);
            --gradient-4: linear-gradient(135deg, #ff0080 0%, #ffff00 100%);
            --font-main: 'Orbitron', monospace;
            --font-digital: 'JetBrains Mono', monospace;
            --font-mono: 'Orbitron', monospace;
            --border-radius: 2px;
            --border-radius-small: 1px;
        }

        /* Pastel Soft Theme */
        [data-theme="pastel"] {
            --primary: #f8bbd9;
            --secondary: #e2a0c4;
            --accent: #ffd93d;
            --success: #6bcf7f;
            --warning: #ffb347;
            --danger: #ff8a8a;
            --dark: #5d4e75;
            --light: #fff8f0;
            --glass-bg: rgba(255,255,255,0.6);
            --glass-border: rgba(255,255,255,0.8);
            --gradient-1: linear-gradient(135deg, #f8bbd9 0%, #e2a0c4 100%);
            --gradient-2: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            --gradient-3: linear-gradient(135deg, #a8e6cf 0%, #ffd3a5 100%);
            --gradient-4: linear-gradient(135deg, #fd79a8 0%, #fdcb6e 100%);
            --font-main: 'Heebo', sans-serif;
            --font-digital: 'Heebo', sans-serif;
            --font-mono: 'Heebo', sans-serif;
            --border-radius: 30px;
            --border-radius-small: 15px;
        }

        /* Dark Gaming Theme */
        [data-theme="gaming"] {
            --primary: #0d1421;
            --secondary: #1e2328;
            --accent: #c9aa71;
            --success: #0596aa;
            --warning: #f0e6d2;
            --danger: #c89b3c;
            --dark: #010a13;
            --light: #f0e6d2;
            --glass-bg: rgba(200,155,60,0.1);
            --glass-border: rgba(200,155,60,0.3);
            --gradient-1: linear-gradient(135deg, #0d1421 0%, #1e2328 100%);
            --gradient-2: linear-gradient(135deg, #463714 0%, #58381e 100%);
            --gradient-3: linear-gradient(135deg, #c9aa71 0%, #c89b3c 100%);
            --gradient-4: linear-gradient(135deg, #0596aa 0%, #0ac8b9 100%);
            --font-main: 'Heebo', sans-serif;
            --font-digital: 'Orbitron', monospace;
            --font-mono: 'JetBrains Mono', monospace;
            --border-radius: 8px;
            --border-radius-small: 4px;
        }

        /* Retro 80s Theme */
        [data-theme="retro"] {
            --primary: #ff006e;
            --secondary: #8338ec;
            --accent: #ffbe0b;
            --success: #3a86ff;
            --warning: #fb5607;
            --danger: #ff006e;
            --dark: #06ffa5;
            --light: #ffffff;
            --glass-bg: rgba(255,190,11,0.2);
            --glass-border: rgba(255,190,11,0.5);
            --gradient-1: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            --gradient-2: linear-gradient(135deg, #ffbe0b 0%, #fb5607 100%);
            --gradient-3: linear-gradient(135deg, #3a86ff 0%, #06ffa5 100%);
            --gradient-4: linear-gradient(135deg, #ff006e 0%, #ffbe0b 100%);
            --font-main: 'Orbitron', monospace;
            --font-digital: 'JetBrains Mono', monospace;
            --font-mono: 'Orbitron', monospace;
            --border-radius: 0px;
            --border-radius-small: 0px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: var(--gradient-1);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: var(--light);
            transition: all 0.5s ease;
        }

        /* רקע אנימציה */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: var(--gradient-1);
            animation: backgroundPulse 20s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { background: var(--gradient-1); }
            50% { background: var(--gradient-2); }
            100% { background: var(--gradient-3); }
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .shape {
            position: absolute;
            border-radius: var(--border-radius);
            opacity: 0.1;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* ממשק המשחק */
        .game-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .logo-icon {
            font-size: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .theme-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-btn {
            width: 30px;
            height: 30px;
            border: 2px solid var(--glass-border);
            border-radius: var(--border-radius-small);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            border-color: var(--accent);
        }

        .theme-btn.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .theme-btn[data-theme="glass"] { background: linear-gradient(135deg, #667eea, #764ba2); }
        .theme-btn[data-theme="register"] { background: linear-gradient(135deg, #1a1a1a, #ffca28); }
        .theme-btn[data-theme="neon"] { background: linear-gradient(135deg, #0a0a0a, #00ff88); }
        .theme-btn[data-theme="pastel"] { background: linear-gradient(135deg, #f8bbd9, #ffd93d); }
        .theme-btn[data-theme="gaming"] { background: linear-gradient(135deg, #0d1421, #c9aa71); }
        .theme-btn[data-theme="retro"] { background: linear-gradient(135deg, #ff006e, #ffbe0b); }

        .game-modes {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--border-radius-small);
            background: var(--glass-bg);
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            font-family: var(--font-main);
        }

        .mode-btn:hover {
            background: var(--glass-border);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: var(--accent);
            color: var(--dark);
            border-color: var(--accent);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .product-display {
            margin: 2rem 0;
            padding: 2rem;
            background: var(--glass-bg);
            border-radius: var(--border-radius-small);
            border: 1px solid var(--glass-border);
        }

        .product-image-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 1rem auto;
            border-radius: var(--border-radius-small);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--border-radius-small);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .image-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            border-radius: var(--border-radius-small);
            font-size: 4rem;
            color: var(--accent);
        }

        .product-info {
            margin-top: 1rem;
        }

        .product-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-family: var(--font-digital);
        }

        .product-category {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .product-hint {
            font-size: 0.9rem;
            opacity: 0.7;
            font-style: italic;
        }

        /* סרגל הזזה מתקדם */
        .price-slider-container {
            margin: 2rem 0;
            padding: 2rem;
            background: var(--glass-bg);
            border-radius: var(--border-radius-small);
            border: 1px solid var(--glass-border);
        }

        .price-display {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 1rem;
            font-family: var(--font-digital);
            text-shadow: 0 0 20px var(--accent);
            animation: numberGlow 2s ease-in-out infinite alternate;
        }

        @keyframes numberGlow {
            0% { text-shadow: 0 0 20px var(--accent); }
            100% { text-shadow: 0 0 30px var(--accent), 0 0 40px var(--accent); }
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 20px;
            background: var(--glass-bg);
            border-radius: 10px;
            margin: 2rem 0;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .slider-fill {
            height: 100%;
            background: var(--gradient-4);
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .slider-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .slider-handle {
            position: absolute;
            top: 50%;
            width: 30px;
            height: 30px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 3px solid var(--light);
            transition: all 0.3s ease;
        }

        .slider-handle:hover {
            transform: translate(-50%, -50%) scale(1.2);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .slider-handle.dragging {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.3);
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .quick-amounts {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        .quick-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-small);
            background: var(--glass-bg);
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-main);
        }

        .quick-btn:hover {
            background: var(--accent);
            color: var(--dark);
            transform: translateY(-2px);
        }

        .submit-btn {
            font-size: 1.2rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--border-radius);
            background: var(--gradient-4);
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-family: var(--font-main);
            font-weight: bold;
            margin-top: 2rem;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin: 2rem 0;
            padding: 1rem;
            background: var(--glass-bg);
            border-radius: var(--border-radius-small);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            font-family: var(--font-digital);
        }

        .result-display {
            margin: 2rem 0;
            padding: 2rem;
            border-radius: var(--border-radius-small);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            animation: resultFadeIn 0.5s ease-out;
        }

        @keyframes resultFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-correct {
            background: rgba(6, 255, 165, 0.2);
            border-color: var(--success);
        }

        .result-close {
            background: rgba(255, 179, 71, 0.2);
            border-color: var(--warning);
        }

        .result-wrong {
            background: rgba(255, 107, 107, 0.2);
            border-color: var(--danger);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: var(--border-radius-small);
            background: var(--glass-bg);
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            font-family: var(--font-main);
        }

        .control-btn:hover {
            background: var(--glass-border);
            transform: translateY(-2px);
        }

        /* אפקטים */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .screen-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* הסתרת אלמנטים */
        .hidden {
            display: none !important;
        }

        /* רספונסיבי */
        @media (max-width: 768px) {
            .game-card {
                padding: 1rem;
                margin: 1rem;
            }
            
            .product-image-container {
                width: 150px;
                height: 150px;
            }

            .price-display {
                font-size: 2rem;
            }

            header {
                flex-direction: column;
                padding: 1rem;
            }

            .theme-selector {
                order: -1;
            }
        }

        /* טעינה */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* מודל זום תמונה */
        .image-zoom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease-out;
        }

        .image-zoom-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease-out;
            border: 1px solid var(--glass-border);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .image-zoom-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: var(--border-radius-small);
            margin-bottom: 1rem;
        }

        .image-zoom-info {
            color: var(--light);
        }

        .image-zoom-info h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-family: var(--font-digital);
        }

        .image-zoom-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--danger);
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--light);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .image-zoom-close:hover {
            background: var(--accent);
            transform: rotate(90deg);
        }

        /* תיקון כפתור border כפול */
        .control-btn {
            padding: 0.8rem 1.5rem;
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-small);
            background: var(--glass-bg);
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: var(--font-main);
        }
    </style>
</head>
<body data-theme="glass">
    <div class="animated-bg">
        <div class="floating-shapes"></div>
    </div>

    <div class="game-container">
        <header>
            <div class="logo">
                <span class="logo-icon">💰</span>
                <span>המשחק הסופי עם ערכות נושא</span>
            </div>
            
            <div class="theme-selector">
                <span style="margin-left: 1rem; font-size: 0.9rem;">ערכת נושא:</span>
                <div class="theme-btn active" data-theme="glass" title="זכוכית מודרני"></div>

            <div class="game-modes">

        <main>
            <!-- מסך התחלה -->
            <div id="startScreen" class="game-card">
                <h1>🎮 ברוכים הבאים למשחק עם ערכות נושא!</h1>

                <div class="controls">

                        <div class="score-label">רצף</div>
                        <div class="score-value" id="streakValue">0</div>

                        <div class="score-label">זמן</div>

                        <div class="product-name" id="productName">שם המוצר</div>

                <div class="price-slider-container">

                    <div class="slider-track" id="sliderTrack">

                    <div class="slider-labels">
                        <span>0 ₪</span>

                        <button class="quick-btn" onclick="setPrice(0)">0</button>
                        <button class="quick-btn" onclick="setPrice(10)">10</button>
                        <button class="quick-btn" onclick="setPrice(50)">50</button>
                        <button class="quick-btn" onclick="setPrice(100)">100</button>
                        <button class="quick-btn" onclick="setPrice(500)">500</button>
                        <button class="quick-btn" onclick="setPrice(1000)">1,000</button>
                        <button class="quick-btn" onclick="setPrice(5000)">5,000</button>
                        <button class="quick-btn" onclick="setPrice(10000)">10,000</button>

                    <button class="submit-btn" onclick="checkAnswer()">✅ שלח תשובה</button>
                    <button class="control-btn" onclick="nextQuestion()">⏭️ הבא</button>

            <div id="resultsScreen" class="game-card hidden">
                <h2>🎉 סיימת את המשחק!</h2>
                <div id="finalResults"></div>
                <div class="controls">
                    <button class="submit-btn" onclick="startGame()">🔄 שחק שוב</button>
                    <button class="control-btn" onclick="shareResults()">📤 שתף</button>
                    <button class="control-btn" onclick="goHome()">🏠 בית</button>
                </div>
            </div>
        </main>
    </div>

    <!-- אפקטי קונפטי -->
    <div id="confetti" class="confetti"></div>

    <script>
        // נתוני המשחק
        const GAME_DATA = {
            classic: [
                {name: "עכבר מחשב", emoji: "🖱️", price: 60, hint: "דגם חוטי פשוט לעומת אלחוטי ממותג", category: "מחשבים ואלקטרוניקה", difficulty: 1, image: "./מאגר_תמונות/מחשבים_ואלקטרוניקה/עכבר_מחשב.jpg"},
                {name: "מקלדת", emoji: "⌨️", price: 100, hint: "מממברנה בסיסית עד מכנית פשוטה", category: "מחשבים ואלקטרוניקה", difficulty: 1, image: "./מאגר_תמונות/מחשבים_ואלקטרוניקה/מקלדת.jpg"},
                {name: "מחשב נייד", emoji: "💻", price: 3000, hint: "דגמי כניסה לעומת בינוני-גבוה", category: "מחשבים ואלקטרוניקה", difficulty: 3, image: "./מאגר_תמונות/מחשבים_ואלקטרוניקה/מחשב_נייד.jpg"},
                {name: "מקרר ביתי", emoji: "🧊", price: 3000, hint: "נפח 300–500 ל' ללא דלת כפולה", category: "מוצרי חשמל", difficulty: 3, image: "./מאגר_תמונות/מוצרי_חשמל/מקרר_גדול.jpg"},
                {name: "חלב 3% ליטר", emoji: "🥛", price: 6, hint: "מותג ביתי סטנדרטי", category: "מזון ומשקאות", difficulty: 1, image: "./מאגר_תמונות/מזון_ומשקאות/חלב.jpg"},
                {name: "לחם פרוס", emoji: "🍞", price: 5, hint: "אחיד סטנדרטי 750 גרם", category: "מזון ומשקאות", difficulty: 1, image: "./מאגר_תמונות/מזון_ומשקאות/לחם_פרוס.jpg"},
                {name: "שוקולד", emoji: "🍫", price: 8, hint: "חפיסת שוקולד חלב 100 גרם", category: "מזון ומשקאות", difficulty: 1, image: "./מאגר_תמונות/מזון_ומשקאות/שוקולד.jpg"},
                {name: "טלוויזיה 55 אינץ'", emoji: "📺", price: 2500, hint: "טכנולוגיית LED סטנדרטית", category: "מוצרי חשמל", difficulty: 2, image: "./מאגר_תמונות/מוצרי_חשמל/טלוויזיה_55.jpg"},
            ],
            children: [
                {name: "סט לגו קטן", emoji: "🧱", price: 120, hint: "100-200 חלקים מותג רשמי", category: "משחקים וצעצועים", difficulty: 1, image: "./מאגר_תמונות/משחקים_וצעצועים/לגו_גדול.jpg"},
                {name: "פאזל 300 חלקים", emoji: "🧩", price: 70, hint: "דמויות או נוף", category: "משחקים וצעצועים", difficulty: 1, image: "./מאגר_תמונות/משחקים_וצעצועים/פאזל_300.jpg"},
                {name: "בובת ברבי", emoji: "👸", price: 140, hint: "בובה עם אביזרים", category: "משחקים וצעצועים", difficulty: 1, image: "./מאגר_תמונות/משחקים_וצעצועים/בובת_ברבי.jpg"},
                {name: "כדור", emoji: "⚽", price: 50, hint: "כדור פשוט לשחק", category: "משחקים וצעצועים", difficulty: 1, image: "./מאגר_תמונות/משחקים_וצעצועים/כדור.jpg"},
                {name: "תיק בית ספר", emoji: "🎒", price: 180, hint: "ארגונומי ממותג", category: "לימודים", difficulty: 1, image: "./מאגר_תמונות/לימודים/תיק_בית_ספר.jpg"},
                {name: "נעלי ספורט ילדים", emoji: "👟", price: 220, hint: "מותג מוכר עם בלימה", category: "ביגוד והנעלה", difficulty: 1, image: "./מאגר_תמונות/ביגוד_והנעלה/נעלי_ריצה.jpg"},
            ],
            advanced: [
                {name: "שעון יוקרה", emoji: "⌚", price: 15000, hint: "שעון שוויצרי יוקרתי", category: "יוקרה", difficulty: 3, image: "./מאגר_תמונות/ביגוד_והנעלה/שעון.jpg"},
                {name: "תיק יוקרה", emoji: "👜", price: 8000, hint: "תיק עור מותג יוקרה", category: "יוקרה", difficulty: 3, image: "./מאגר_תמונות/ביגוד_והנעלה/תיק_יד.jpg"},
                {name: "מחשב גיימינג", emoji: "🖥️", price: 8000, hint: "מחשב נייח יוקרתי לגיימרים", category: "מחשבים ואלקטרוניקה", difficulty: 3, image: "./מאגר_תמונות/מחשבים_ואלקטרוניקה/מחשב_שולחני.jpg"},
                {name: "אופניים חשמליים", emoji: "🚲", price: 4500, hint: "אופניים חשמליים איכותיים", category: "ספורט", difficulty: 2, image: "./מאגר_תמונות/ספורט/אופניים.jpg"},
            ]
        };

        // משתני המשחק
        let currentMode = 'classic';
        let currentProduct = null;
        let currentPrice = 0;
        let score = 0;
        let questionNumber = 1;
        let totalQuestions = 15;
        let streak = 0;
        let timeRemaining = 30;
        let gameTimer = null;
        let gameHistory = [];
        let gameStartTime = null;

        // אלמנטים
        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const resultsScreen = document.getElementById('resultsScreen');
        const productImage = document.getElementById('productImage');
        const imagePlaceholder = document.getElementById('imagePlaceholder');
        const productEmoji = document.getElementById('productEmoji');
        const productName = document.getElementById('productName');
        const productCategory = document.getElementById('productCategory');
        const productHint = document.getElementById('productHint');
        const priceDisplay = document.getElementById('priceDisplay');
        const sliderTrack = document.getElementById('sliderTrack');
        const sliderFill = document.getElementById('sliderFill');
        const sliderHandle = document.getElementById('sliderHandle');
        const resultDisplay = document.getElementById('resultDisplay');
        const resultText = document.getElementById('resultText');
        const resultDetails = document.getElementById('resultDetails');
        const scoreValue = document.getElementById('scoreValue');
        const questionNumberEl = document.getElementById('questionNumber');
        const streakValue = document.getElementById('streakValue');
        const timeRemainingEl = document.getElementById('timeRemaining');

        // אתחול
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            initializeSlider();
            createFloatingShapes();
            initializeGame();
        });

        function setupEventListeners() {
            // כפתורי מצבי משחק
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMode = this.dataset.mode;
                });
            });

            // כפתורי ערכות נושא
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.body.setAttribute('data-theme', this.dataset.theme);
                });
            });

            // זום תמונה
            productImage.addEventListener('click', function() {
                if (!this.classList.contains('hidden')) {
                    showImageZoom(this.src, currentProduct.name, currentProduct.hint, currentProduct.category);
                }
            });
        }

        function initializeSlider() {
            let isDragging = false;
            const maxPrice = 100000;

            function updateSlider(percentage) {
                // הגבל את האחוזים בין 0 ל-100
                percentage = Math.max(0, Math.min(100, percentage));
                const price = Math.round((percentage / 100) * maxPrice);
                currentPrice = price;
                
                // עדכן תצוגת המחיר
                if (priceDisplay) {
                    priceDisplay.textContent = price.toLocaleString() + ' ₪';
                }
                
                // עדכן את הסרגל
                if (sliderFill) {
                    sliderFill.style.width = percentage + '%';
                }
                
                if (sliderHandle) {
                    sliderHandle.style.left = percentage + '%';
                }
            }

            function getPercentageFromEvent(e) {
                if (!sliderTrack) return 0;
                
                const rect = sliderTrack.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0)) - rect.left;
                const percentage = Math.max(0, Math.min(100, (x / rect.width) * 100));
                return percentage;
            }

            // הוסף מאזיני אירועים רק אם האלמנטים קיימים
            if (sliderHandle) {
                sliderHandle.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    sliderHandle.classList.add('dragging');
                    e.preventDefault();
                });

                sliderHandle.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    sliderHandle.classList.add('dragging');
                    e.preventDefault();
                });
            }

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const percentage = getPercentageFromEvent(e);
                    updateSlider(percentage);
                }
            });

            document.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const percentage = getPercentageFromEvent(e);
                    updateSlider(percentage);
                    e.preventDefault();
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                if (sliderHandle) {
                    sliderHandle.classList.remove('dragging');
                }
            });

            document.addEventListener('touchend', () => {
                isDragging = false;
                if (sliderHandle) {
                    sliderHandle.classList.remove('dragging');
                }
            });

            if (sliderTrack) {
                sliderTrack.addEventListener('click', (e) => {
                    if (!isDragging) {
                        const percentage = getPercentageFromEvent(e);
                        updateSlider(percentage);
                    }
                });
            }

            // אתחול
            updateSlider(0);
        }

        function setPrice(price) {
            const percentage = Math.max(0, Math.min(100, (price / 100000) * 100));
            currentPrice = price;
            
            if (priceDisplay) {
                priceDisplay.textContent = price.toLocaleString() + ' ₪';
            }
            
            if (sliderFill) {
                sliderFill.style.width = percentage + '%';
            }
            
            if (sliderHandle) {
                sliderHandle.style.left = percentage + '%';
            }
        }

        function createFloatingShapes() {
            const shapesContainer = document.querySelector('.floating-shapes');
            for (let i = 0; i < 10; i++) {
                const shape = document.createElement('div');
                shape.className = 'shape';
                shape.style.left = Math.random() * 100 + '%';
                shape.style.top = Math.random() * 100 + '%';
                shape.style.width = Math.random() * 100 + 50 + 'px';
                shape.style.height = shape.style.width;
                shape.style.background = `rgba(255,255,255,${Math.random() * 0.1})`;
                shape.style.animationDelay = Math.random() * 10 + 's';
                shapesContainer.appendChild(shape);
            }
        }

        function initializeGame() {
            score = 0;
            questionNumber = 1;
            streak = 0;
            gameHistory = [];
            updateUI();
        }

        function startGame() {
            gameStartTime = Date.now();
            startScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            resultsScreen.classList.add('hidden');
            
            initializeGame();
            nextQuestion();
            startTimer();
        }

        function nextQuestion() {
            if (questionNumber > totalQuestions) {
                endGame();
                return;
            }

            const products = GAME_DATA[currentMode] || GAME_DATA.classic;
            currentProduct = products[Math.floor(Math.random() * products.length)];
            
            updateProductDisplay();
            resultDisplay.classList.add('hidden');
            setPrice(0);
            
            updateUI();
            timeRemaining = 30;
            startTimer();
        }

        function updateProductDisplay() {
            productName.textContent = currentProduct.name;
            productCategory.textContent = currentProduct.category;
            productHint.textContent = currentProduct.hint;
            productEmoji.textContent = currentProduct.emoji;
            
            loadSmartImage(currentProduct);
        }

        function loadSmartImage(product) {
            if (product.image) {
                const tempImg = new Image();
                tempImg.onload = function() {
                    productImage.src = product.image;
                    productImage.classList.remove('hidden');
                    imagePlaceholder.classList.add('hidden');
                };
                tempImg.onerror = function() {
                    productImage.classList.add('hidden');
                    imagePlaceholder.classList.remove('hidden');
                };
                tempImg.src = product.image;
            } else {
                productImage.classList.add('hidden');
                imagePlaceholder.classList.remove('hidden');
            }
        }

        function checkAnswer() {
            const userGuess = currentPrice;
            const realPrice = currentProduct.price;
            const difference = Math.abs(userGuess - realPrice);
            const percentageError = (difference / realPrice) * 100;
            
            let points = 0;
            let accuracy = '';
            let resultClass = '';
            
            if (percentageError <= 5) {
                points = 100 + (currentProduct.difficulty * 20);
                accuracy = 'מושלם! 🎯';
                resultClass = 'result-correct';
                streak++;
                createConfetti();
            } else if (percentageError <= 15) {
                points = 80 + (currentProduct.difficulty * 15);
                accuracy = 'מעולה! 👍';
                resultClass = 'result-correct';
                streak++;
                createConfetti();
            } else if (percentageError <= 30) {
                points = 60 + (currentProduct.difficulty * 10);
                accuracy = 'טוב! 👌';
                resultClass = 'result-close';
                streak = 0;
            } else if (percentageError <= 50) {
                points = 30;
                accuracy = 'לא רע 🤔';
                resultClass = 'result-close';
                streak = 0;
            } else {
                points = 10;
                accuracy = 'לא מדויק 😅';
                resultClass = 'result-wrong';
                streak = 0;
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 500);
            }
            
            if (streak >= 3) {
                points += streak * 10;
            }
            
            score += points;
            
            gameHistory.push({
                product: currentProduct.name,
                guess: userGuess,
                real: realPrice,
                points: points,
                accuracy: percentageError.toFixed(1)
            });
            
            showResult(accuracy, userGuess, realPrice, points, percentageError, resultClass);
            
            questionNumber++;
            clearTimeout(gameTimer);
            
            setTimeout(() => {
                nextQuestion();
            }, 3000);
        }

        function showResult(accuracy, guess, real, points, error, resultClass) {
            resultDisplay.className = `result-display ${resultClass}`;
            resultText.innerHTML = `
                <h3>${accuracy}</h3>
                <p><strong>+${points} נקודות</strong></p>
            `;
            resultDetails.innerHTML = `
                <p>הניחוש שלך: <strong>${guess.toLocaleString()}₪</strong></p>
                <p>המחיר האמיתי: <strong>${real.toLocaleString()}₪</strong></p>
                <p>שגיאה: <strong>${error.toFixed(1)}%</strong></p>
                ${streak >= 3 ? `<p>🔥 רצף: ${streak} שאלות!</p>` : ''}
            `;
            resultDisplay.classList.remove('hidden');
        }

        function createConfetti() {
            const confetti = document.getElementById('confetti');
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3'];
            
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 3 + 's';
                confetti.appendChild(piece);
                
                setTimeout(() => piece.remove(), 3000);
            }
        }

        function startTimer() {
            clearTimeout(gameTimer);
            gameTimer = setInterval(() => {
                timeRemaining--;
                timeRemainingEl.textContent = timeRemaining;
                
                if (timeRemaining <= 0) {
                    clearTimeout(gameTimer);
                    showResult('זמן נגמר! ⏰', 0, currentProduct.price, 0, 100, 'result-wrong');
                    questionNumber++;
                    setTimeout(() => nextQuestion(), 2000);
                }
            }, 1000);
        }

        function updateUI() {
            scoreValue.textContent = score.toLocaleString();
            questionNumberEl.textContent = `${questionNumber}/${totalQuestions}`;
            streakValue.textContent = streak;
            timeRemainingEl.textContent = timeRemaining;
        }

        function endGame() {
            clearTimeout(gameTimer);
            gameScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');
            
            const gameTime = Math.round((Date.now() - gameStartTime) / 1000);
            const averageScore = Math.round(score / totalQuestions);
            const accuracy = gameHistory.reduce((sum, item) => sum + parseFloat(item.accuracy), 0) / gameHistory.length;
            
            document.getElementById('finalResults').innerHTML = `
                <div class="score-display">
                    <div class="score-item">
                        <div class="score-label">ניקוד סופי</div>
                        <div class="score-value">${score.toLocaleString()}</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">ממוצע שאלה</div>
                        <div class="score-value">${averageScore}</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">דיוק ממוצע</div>
                        <div class="score-value">${accuracy.toFixed(1)}%</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">זמן כולל</div>
                        <div class="score-value">${gameTime}s</div>
                    </div>
                </div>
                <h3>🏆 הישגים:</h3>
                <ul style="text-align: right; margin: 1rem 0;">
                    ${getAchievements().map(achievement => `<li>${achievement}</li>`).join('')}
                </ul>
            `;
            
            createConfetti();
        }

        function getAchievements() {
            const achievements = [];
            if (score >= 1500) achievements.push('🏆 מומחה מחירים');
            if (score >= 1000) achievements.push('🥇 ברונזה');
            if (score >= 500) achievements.push('🥈 כסף');
            if (streak >= 5) achievements.push('🔥 רצף מדהים');
            if (gameHistory.some(item => parseFloat(item.accuracy) <= 5)) achievements.push('🎯 דיוק מושלם');
            if (achievements.length === 0) achievements.push('💪 תמשיך להתרגל!');
            return achievements;
        }

        function showImageZoom(src, name, hint, category) {
            const overlay = document.createElement('div');
            overlay.className = 'image-zoom-overlay';
            
            const content = document.createElement('div');
            content.className = 'image-zoom-content';
            
            const closeBtn = document.createElement('button');
            closeBtn.className = 'image-zoom-close';
            closeBtn.innerHTML = '×';
            closeBtn.onclick = () => overlay.remove();
            
            const image = document.createElement('img');
            image.className = 'image-zoom-image';
            image.src = src;
            image.alt = name;
            
            const info = document.createElement('div');
            info.className = 'image-zoom-info';
            info.innerHTML = `
                <h3>🛍️ ${name}</h3>
                <p><strong>📂 קטגוריה:</strong> ${category}</p>
                <p><strong>💡 רמז:</strong> ${hint}</p>
                <p><strong>🎯 טיפ:</strong> השווה מחירים במקומות שונים!</p>
            `;
            
            content.appendChild(closeBtn);
            content.appendChild(image);
            content.appendChild(info);
            overlay.appendChild(content);
            document.body.appendChild(overlay);
            
            // סגירה בקליק על הרקע
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    overlay.remove();
                }
            });
            
            // סגירה במקש ESC
            const handleEscape = (e) => {
                if (e.key === 'Escape') {
                    overlay.remove();
                    document.removeEventListener('keydown', handleEscape);
                }
            };
            document.addEventListener('keydown', handleEscape);
        }

        function useHint() {
            if (currentProduct) {
                alert(`רמז: ${currentProduct.hint}\n\nקטגוריה: ${currentProduct.category}\nרמת קושי: ${currentProduct.difficulty}/3`);
            }
        }

        function shareResults() {
            const text = `🎮 שיחקתי במשחק המחירים עם ערכות נושא!\n📊 ניקוד: ${score.toLocaleString()}\n🎯 מצב: ${currentMode}\n\nתנסו גם אתם!`;
            if (navigator.share) {
                navigator.share({
                    title: 'המשחק הסופי עם ערכות נושא - הכל בכסף',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('התוצאות הועתקו ללוח!');
                });
            }
        }

        function goHome() {
            startScreen.classList.remove('hidden');
            gameScreen.classList.add('hidden');
            resultsScreen.classList.add('hidden');
            clearTimeout(gameTimer);
        }
